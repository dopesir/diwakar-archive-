# Sveltia CMS configuration — see README §"Content management (CMS)".
#
# 1. Replace OWNER/REPO below with your GitHub repository (e.g. janedoe/diwakar-archive).
# 2. Wire up GitHub auth (sveltia-cms-auth worker or an OAuth app) — README has steps.
# 3. The editor then signs in at /admin/.

backend:
  name: github
  repo: OWNER/REPO # ← CHANGE THIS
  branch: main
  # commit_messages are optional niceties:
  commit_messages:
    create: 'CMS: create {{collection}} "{{slug}}"'
    update: 'CMS: update {{collection}} "{{slug}}"'
    delete: 'CMS: delete {{collection}} "{{slug}}"'

# Branding for the sign-in screen and header.
logo_url: /favicon.svg
site_url: https://diwakar-archive.pages.dev # ← update after deploy
display_url: https://diwakar-archive.pages.dev

# Direct commits to `branch` — no editorial review queue. Simplest for one editor.
publish_mode: simple

# Uploaded photos are committed to src/assets/uploads. Each collection overrides
# media_folder/public_folder with the RELATIVE path ../../assets/uploads so the
# path written into entries resolves through Astro's image() pipeline — every
# collection lives at src/content/<collection>/<file>, exactly two levels above
# src/assets/. (Sveltia requires the GLOBAL public_folder to be absolute, so the
# relative mapping must live on the collections, not here.)
media_folder: src/assets/uploads

collections:
  # ---------------------------------------------------------------- SITE SETTINGS
  - name: settings
    label: Site settings
    description: Global values used across the site. The header and footer are fixed in code and not edited here.
    icon: settings
    files:
      # ---------------------------------------------------------- SITE (global)
      - name: site
        label: Site & SEO
        file: src/content/settings/site.yaml
        media_folder: ../../assets/uploads
        public_folder: ../../assets/uploads
        icon: public
        description: SEO defaults, analytics, contact details, social links and the announcement bar.
        fields:
          - name: seo
            label: SEO defaults
            widget: object
            collapsed: false
            hint: Used as the fallback for any page that doesn't set its own SEO.
            fields:
              - name: defaultDescription
                label: Default meta description
                widget: text
                required: false
                hint: 'The site-wide description used when a page has none. Aim for 150–160 characters.'
              - name: ogSiteName
                label: Social site name
                widget: string
                required: false
                hint: 'Shown as the site name when a page is shared on social media.'
              - name: shareImage
                label: Default share image
                widget: image
                required: false
                hint: 'Fallback image shown when a page without its own image is shared (ideally 1200×630).'
          - name: analytics
            label: Analytics (optional)
            widget: object
            collapsed: true
            hint: 'Leave blank for no analytics. Adding a provider also needs your developer to allow its address in the security headers.'
            fields:
              - name: scriptUrl
                label: Analytics script URL
                widget: string
                required: false
                hint: 'Full https:// URL of a privacy-friendly analytics script (e.g. Plausible/Umami). Blank = no analytics.'
              - name: siteId
                label: Site / domain ID
                widget: string
                required: false
                hint: 'The site identifier your analytics provider asks for (often your domain). Optional.'
          - name: contact
            label: Contact details
            widget: object
            collapsed: true
            hint: 'Shown in the Connect section only — never in the footer. Leave blank to hide.'
            fields:
              - name: email
                label: Contact email
                widget: string
                required: false
                pattern: ['^$|^[^@\s]+@[^@\s]+\.[^@\s]+$', 'Enter a valid email address or leave blank.']
                hint: 'Shown as a mailto link on the Connect page. Blank = hidden.'
              - name: phone
                label: Contact phone
                widget: string
                required: false
                hint: 'Optional phone number shown beside the email. Blank = hidden.'
          - name: social
            label: Social links
            widget: object
            collapsed: true
            hint: 'Used by the Connect page and the pre-footer call-to-action. (The footer keeps its own links in code.)'
            fields:
              - name: instagramUrl
                label: Instagram URL
                widget: string
                required: false
              - name: instagramLabel
                label: Instagram label
                widget: string
                required: false
                hint: 'Text on the button, e.g. "@lifeonimage".'
              - name: linkedinUrl
                label: LinkedIn URL
                widget: string
                required: false
              - name: linkedinLabel
                label: LinkedIn label
                widget: string
                required: false
              - name: gettyUrl
                label: Getty Images URL
                widget: string
                required: false
              - name: gettyLabel
                label: Getty label
                widget: string
                required: false
                hint: 'Text on the button, e.g. "Getty Images · 1,308+".'
          - name: announcement
            label: Announcement bar
            widget: object
            collapsed: true
            hint: 'A thin band across the very top of every page. It sits above the menu and visitors can dismiss it.'
            fields:
              - name: enabled
                label: Show announcement bar
                widget: boolean
                default: false
                hint: 'Off = no bar at all (the default).'
              - name: text
                label: Message
                widget: string
                required: false
                hint: 'The text shown in the bar. Required for the bar to appear.'
              - name: link
                label: Link (optional)
                widget: string
                required: false
                hint: 'Where the bar links to, e.g. "/connect/" or a full https:// URL. Blank = no link.'
              - name: linkLabel
                label: Link label (optional)
                widget: string
                required: false
                hint: 'Text for the link, e.g. "Learn more". Defaults to "Learn more" if a link is set.'
          - name: connect
            label: Connect call-to-action
            widget: object
            collapsed: true
            hint: 'The "Connect & Collaborate" copy shown on the Connect page and at the foot of every other page. (The footer itself stays in code.)'
            fields:
              - name: eyebrow
                label: Eyebrow (small heading)
                widget: string
                required: false
                hint: 'Small label above the heading, e.g. "Connect & Collaborate".'
              - name: heading
                label: Heading
                widget: string
                required: false
                hint: 'The large heading, e.g. "Find the work online.".'
              - name: body
                label: Body text
                widget: text
                required: false
                hint: 'The paragraph under the heading.'
              - name: note
                label: Footnote
                widget: string
                required: false
                hint: 'Small line below the buttons, e.g. "Representation by invitation only · India Today Group".'
          - name: appearance
            label: Appearance
            widget: object
            collapsed: true
            hint: 'Subtle, on-brand theme presets. These cannot break the design — there is no free colour picker.'
            fields:
              - name: accent
                label: Accent colour
                widget: select
                default: ochre
                options:
                  - { label: 'Ochre (default)', value: ochre }
                  - { label: 'Terracotta', value: terracotta }
                  - { label: 'Rust', value: rust }
                  - { label: 'Clay', value: clay }
                hint: 'The highlight colour for links, buttons and labels. All options are dark enough to stay legible.'
              - name: scrim
                label: Hero overlay strength
                widget: select
                default: medium
                options:
                  - { label: 'Soft', value: soft }
                  - { label: 'Medium (default)', value: medium }
                  - { label: 'Strong', value: strong }
                hint: 'How dark the shading over the home hero photos is, so the title stays readable.'
          - name: languages
            label: Languages
            widget: object
            collapsed: true
            hint: 'The site is built for English + Hindi. The language switcher stays hidden until you turn it on — turn it on only once you have started adding Hindi translations, otherwise visitors would see English under the Hindi option.'
            fields:
              - name: showSwitcher
                label: Show the English / हिंदी switcher
                widget: boolean
                default: false
                hint: 'Off by default. Turn on once Hindi content exists.'

      # ---------------------------------------------------------- HOME SECTIONS
      - name: sections
        label: Home page sections
        file: src/content/settings/sections.yaml
        media_folder: ../../assets/uploads
        public_folder: ../../assets/uploads
        icon: dashboard
        description: Copy, show/hide and order for the home page sections. The page layout itself stays fixed in code.
        fields:
          - name: hero
            label: Hero slideshow
            widget: object
            collapsed: false
            hint: The big rotating photographs at the top. Edit the slides themselves under "Hero slides".
            fields:
              - name: visible
                label: Show hero slideshow
                widget: boolean
                default: true
                hint: 'Off = hide the whole slideshow on the home page.'
          - name: intro
            label: Introduction
            widget: object
            collapsed: false
            hint: The statement block near the top of the home page.
            fields:
              - name: visible
                label: Show this section
                widget: boolean
                default: true
              - name: order
                label: Order
                widget: number
                value_type: int
                default: 1
                hint: 'Lower numbers appear first. Controls whether Introduction or Selected Frames comes first.'
              - name: eyebrow
                label: Eyebrow (small heading)
                widget: string
                required: false
                hint: 'Small label above the text, e.g. "The Eye Behind the Frame".'
              - name: paragraphs
                label: Paragraphs
                widget: list
                field: { name: text, label: Paragraph, widget: text }
                hint: 'One entry per paragraph. Plain text only.'
              - name: signature
                label: Signature line
                widget: string
                required: false
                hint: 'The closing line, e.g. "Witness · Humanist · Archivist".'
          - name: stats
            label: Statistics
            widget: object
            collapsed: true
            hint: The four big figures beside the introduction.
            fields:
              - name: visible
                label: Show statistics
                widget: boolean
                default: true
              - name: items
                label: Figures
                widget: list
                summary: '{{fields.value}}{{fields.suffix}} — {{fields.label}}'
                hint: 'Each figure counts up when scrolled into view. Use a plain number to animate (e.g. "1308"); symbols like "∞" show as-is.'
                fields:
                  - name: value
                    label: Figure
                    widget: string
                    hint: 'e.g. "27", "1308", or "∞".'
                  - name: suffix
                    label: Suffix
                    widget: string
                    required: false
                    hint: 'Optional symbol after the number, e.g. "+".'
                  - name: label
                    label: Label
                    widget: string
                    hint: 'e.g. "Years in the Field".'
          - name: featured
            label: Selected Frames
            widget: object
            collapsed: true
            hint: The featured-work grid. Choose which photos appear by toggling "Feature on home page" on each Work item.
            fields:
              - name: visible
                label: Show this section
                widget: boolean
                default: true
              - name: order
                label: Order
                widget: number
                value_type: int
                default: 2
                hint: 'Lower numbers appear first.'
              - name: heading
                label: Heading
                widget: string
                required: false
                hint: 'e.g. "Selected Frames".'
              - name: intro
                label: Intro text (optional)
                widget: text
                required: false
                hint: 'Optional sentence shown under the heading. Blank = hidden.'

      # ---------------------------------------------------------- ABOUT BIO (3A)
      - name: about
        label: About — biography
        file: src/content/settings/about.yaml
        media_folder: ../../assets/uploads
        public_folder: ../../assets/uploads
        icon: person
        description: Optional block-composed biography for the About page. Leave the list empty to keep the original written bio.
        fields:
          - name: aboutBlocks
            label: Biography blocks
            label_singular: block
            widget: list
            required: false
            hint: 'Leave empty to keep the original biography. Add blocks to compose your own — they replace the written bio.'
            # Reusable block palette, shared by the Stories and Thoughts bodies.
            types: &content_blocks
              - name: richText
                label: Text
                widget: object
                summary: 'Text'
                fields:
                  - name: markdown
                    label: Text
                    widget: text
                    hint: 'Plain text. **bold**, *italic*, `code` and [links](https://…) are supported; a blank line starts a new paragraph. (No raw HTML.)'
              - name: image
                label: Image
                widget: object
                summary: 'Image — {{fields.alt}}'
                fields:
                  - { name: image, label: Image, widget: image }
                  - name: alt
                    label: Alt text (accessibility)
                    widget: string
                    required: false
                    hint: 'Describes the image for screen readers. If blank, the caption is used.'
                  - { name: caption, label: Caption, widget: string, required: false }
              - name: gallery
                label: Gallery
                widget: object
                summary: 'Gallery ({{fields.columns}} columns)'
                fields:
                  - name: columns
                    label: Columns
                    widget: select
                    options: ['2', '3', '4']
                    default: '3'
                    hint: 'On phones the gallery collapses to 1–2 columns automatically.'
                  - name: images
                    label: Images
                    widget: list
                    fields:
                      - { name: image, label: Image, widget: image }
                      - { name: alt, label: Alt text, widget: string, required: false }
                      - { name: caption, label: Caption, widget: string, required: false }
              - name: quote
                label: Pull quote
                widget: object
                summary: 'Quote — {{fields.text}}'
                fields:
                  - { name: text, label: Quote, widget: text }
                  - { name: cite, label: Attribution, widget: string, required: false }
              - name: cta
                label: Call to action
                widget: object
                summary: 'Button — {{fields.label}}'
                fields:
                  - { name: heading, label: Heading, widget: string, required: false }
                  - { name: text, label: Text, widget: text, required: false }
                  - { name: label, label: Button label, widget: string }
                  - name: href
                    label: Button link
                    widget: string
                    hint: 'A site path ("/connect/") or a full https:// URL.'
              - name: embed
                label: Video link
                widget: object
                summary: 'Video — {{fields.title}}'
                fields:
                  - name: provider
                    label: Provider
                    widget: select
                    options: [youtube, vimeo]
                    default: youtube
                  - name: url
                    label: Video URL
                    widget: string
                    hint: 'Full https:// URL on the chosen provider. Shown as a privacy-friendly link-out card (no third-party tracking embed).'
                  - { name: title, label: Title, widget: string, required: false }

      # ---------------------------------------------------------- LAYOUT (3D)
      - name: layout
        label: Layout & alignment
        file: src/content/settings/layout.yaml
        media_folder: ../../assets/uploads
        public_folder: ../../assets/uploads
        icon: dashboard_customize
        description: Arrange sections and listings with safe presets. Every option defaults to the current design and cannot break the layout (no raw CSS).
        fields:
          - name: layout
            label: Layout
            widget: object
            fields:
              - name: sections
                label: Section alignment & background
                widget: object
                collapsed: true
                hint: 'Applies to the text sections only — not the locked hero or art-directed strips.'
                fields:
                  - name: intro
                    label: Home — Introduction
                    widget: object
                    collapsed: true
                    fields: &section_layout_fields
                      - {
                          name: align,
                          label: Alignment,
                          widget: select,
                          default: left,
                          options: [left, center, right],
                        }
                      - {
                          name: width,
                          label: Width,
                          widget: select,
                          default: normal,
                          options: [narrow, normal, wide, full],
                        }
                      - {
                          name: spacing,
                          label: Vertical spacing,
                          widget: select,
                          default: normal,
                          options: [compact, normal, spacious],
                        }
                      - name: background
                        label: Background tone
                        widget: select
                        default: none
                        options: [none, parchment, sand, ink]
                        hint: 'The dark "ink" tone automatically switches its text to a light, legible treatment — contrast always passes.'
                  - { name: featured, label: Home — Selected Frames, widget: object, collapsed: true, fields: *section_layout_fields }
                  - { name: workIntro, label: Work — intro, widget: object, collapsed: true, fields: *section_layout_fields }
                  - { name: storiesIntro, label: Stories — intro, widget: object, collapsed: true, fields: *section_layout_fields }
                  - { name: thoughtsIntro, label: Thoughts — intro, widget: object, collapsed: true, fields: *section_layout_fields }
              - name: grids
                label: Listing grids
                widget: object
                collapsed: true
                fields:
                  - name: work
                    label: Work grid
                    widget: object
                    collapsed: true
                    fields:
                      - {
                          name: columns,
                          label: Columns,
                          widget: select,
                          default: auto,
                          options: [auto, '2', '3', '4'],
                        }
                      - {
                          name: gap,
                          label: Gap,
                          widget: select,
                          default: normal,
                          options: [tight, normal, roomy],
                        }
                      - {
                          name: aspect,
                          label: Image shape,
                          widget: select,
                          default: landscape,
                          options: [square, portrait, landscape, original],
                        }
                      - {
                          name: imageFit,
                          label: Image fit,
                          widget: select,
                          default: cover,
                          options: [cover, contain],
                        }
                      - name: sort
                        label: Order
                        widget: select
                        default: newest
                        options: [newest, oldest, by-year, manual]
                        hint: 'Pick "manual" to arrange items yourself with each Work item''s Order/Size fields.'
                  - name: stories
                    label: Stories list
                    widget: object
                    collapsed: true
                    fields: &list_layout_fields
                      - {
                          name: columns,
                          label: Columns,
                          widget: select,
                          default: '1',
                          options: ['1', '2', '3'],
                        }
                      - {
                          name: gap,
                          label: Gap,
                          widget: select,
                          default: normal,
                          options: [tight, normal, roomy],
                        }
                      - {
                          name: sort,
                          label: Order,
                          widget: select,
                          default: newest,
                          options: [newest, oldest, by-year, manual],
                        }
                  - { name: thoughts, label: Thoughts list, widget: object, collapsed: true, fields: *list_layout_fields }

  # ---------------------------------------------------------------- REDIRECTS
  - name: redirects
    label: Redirects
    label_singular: Redirect
    description: Send an old or vanity URL somewhere else. The site's _redirects file is rebuilt from these on publish.
    icon: alt_route
    folder: src/content/redirects
    extension: yaml
    format: yaml
    create: true
    identifier_field: from
    summary: '{{from}} → {{to}} ({{status}})'
    sortable_fields: [from, status]
    fields:
      - name: from
        label: From (old path)
        widget: string
        pattern: ['^/\S*$', 'Start with "/" and use no spaces, e.g. /old-page']
        hint: 'The path on this site that should redirect, e.g. "/old-portfolio".'
      - name: to
        label: To (destination)
        widget: string
        pattern: ['^(/\S*|https?://\S+)$', 'A site path ("/…") or a full https:// URL']
        hint: 'Where visitors land — a page on this site ("/work/") or a full https:// URL.'
      - name: status
        label: Type
        widget: select
        options:
          - { label: 'Permanent (301)', value: 301 }
          - { label: 'Temporary (302)', value: 302 }
        default: 301
        hint: 'Permanent for moved pages (best for SEO); temporary for short-term redirects.'

  # ---------------------------------------------------------------- HERO
  - name: hero
    label: Hero slides
    label_singular: Hero slide
    description: The 7 rotating photographs on the home page. Order 1 shows first.
    icon: imagesmode
    folder: src/content/hero
    media_folder: ../../assets/uploads
    public_folder: ../../assets/uploads
    extension: yaml
    format: yaml
    create: true
    identifier_field: title
    summary: '{{order}} · {{location}} — {{title}}'
    sortable_fields: [order, location, title]
    editor:
      preview: false
    fields:
      - name: order
        label: 'Order (1–7)'
        widget: number
        value_type: int
        min: 1
        max: 7
        hint: Position in the slideshow — 1 plays first.
      - name: location
        label: Location
        widget: string
        hint: 'Short place name shown above the caption, e.g. "Jaipur".'
      - name: title
        label: Caption line
        widget: text
        hint: One or two lines shown over the photo in italics.
      - name: alt
        label: Alt text (accessibility)
        widget: string
        required: false
        hint: 'Describes the photo for screen readers and search engines. If blank, the caption line is used.'
      - name: imageDesktop
        label: Desktop image (landscape)
        widget: image
        hint: 'Wide/landscape photo, at least 2000px on the long edge.'
      - name: imageMobile
        label: Mobile image (portrait)
        widget: image
        required: false
        hint: 'Optional tall/portrait crop for phones, at least 1200px high. If empty, the desktop photo is reused.'
      - name: position
        label: Focus point (desktop)
        widget: string
        default: center
        hint: 'Which part of the photo stays visible when cropped — e.g. "center", "center 30%" (towards the top), "left center".'
      - name: positionMobile
        label: Focus point (mobile)
        widget: string
        required: false
        hint: 'Optional focus point for the phone crop, same format as above. If blank, the desktop focus point is used.'
      - name: tone
        label: Scrim tone
        widget: select
        options: [dark, bright]
        default: bright
        hint: 'Pick "bright" if the photo is light (adds a darker overlay so text stays readable), "dark" if the photo is already dark.'

  # ---------------------------------------------------------------- MAGAZINES
  - name: magazines
    label: Magazines (flipbooks)
    label_singular: Magazine
    description: The magazine covers on the About page. Each cover opens its flipbook reader in a new tab.
    icon: menu_book
    folder: src/content/magazines
    media_folder: ../../assets/uploads
    public_folder: ../../assets/uploads
    extension: yaml
    format: yaml
    create: true
    identifier_field: title
    summary: '{{order}} · {{title}}'
    sortable_fields: [order, title]
    view_filters:
      - { label: 'Hidden from site', field: draft, pattern: true }
    editor:
      preview: false
    fields:
      - name: title
        label: Title
        widget: string
        hint: 'Full name, e.g. "Jeene Ka Andaaz — June 2026".'
      - name: badge
        label: Cover badge
        widget: string
        hint: 'Short label shown on the cover, e.g. "June 2026". Displays as "June 2026 · Flipbook".'
      - name: cover
        label: Cover image
        widget: image
        hint: 'Portrait cover scan, at least 600px wide.'
      - name: link
        label: Flipbook link
        widget: string
        hint: 'Where the cover opens. For magazines hosted on this site use "/flipbook/<name>/". For a NEW magazine: paste any full flipbook URL (https://...), or send the flipbook HTML file to your developer to host it here first.'
      - name: order
        label: Order
        widget: number
        value_type: int
        hint: Position in the strip — 1 shows first.
      - name: draft
        label: Hide from site
        widget: boolean
        default: false
        hint: On = kept here but not shown on the website.
      - name: publishDate
        label: Publish date (optional)
        widget: datetime
        required: false
        hint: 'Leave blank to publish now. A future date/time keeps it hidden until then — the site must rebuild for it to appear (see README on scheduled publishing).'

  # ---------------------------------------------------------------- WORK
  - name: work
    label: Work
    label_singular: Work item
    description: The photography portfolio grid. Featured items also appear on the home page.
    icon: photo_camera
    folder: src/content/work
    media_folder: ../../assets/uploads
    public_folder: ../../assets/uploads
    extension: md
    format: frontmatter
    create: true
    slug: '{{slug}}'
    identifier_field: title
    summary: '{{year}} · {{title}}'
    sortable_fields: [order, year, title]
    view_filters:
      - { label: 'Featured on home', field: featured, pattern: true }
      - { label: 'Hidden from site', field: draft, pattern: true }
    fields:
      - name: title
        label: Title
        widget: string
      - name: year
        label: Year
        widget: number
        value_type: int
        min: 1900
        max: 2100
      - name: location
        label: Location
        widget: string
        required: false
      - name: image
        label: Photograph
        widget: image
        required: false
        hint: 'At least 1600px on the long edge. Without a photo, the item shows as a text card.'
      - name: alt
        label: Alt text (accessibility)
        widget: string
        required: false
        hint: 'Describes the photo for screen readers and search engines. If blank, the caption (then title) is used.'
      - name: caption
        label: Caption
        widget: string
        required: false
        hint: Shown under the photo on the detail page and in the full-screen viewer.
      - name: focalPoint
        label: Focus point (grid crop)
        widget: select
        required: false
        options:
          - { label: 'Center', value: center }
          - { label: 'Top', value: top }
          - { label: 'Bottom', value: bottom }
          - { label: 'Left', value: left }
          - { label: 'Right', value: right }
          - { label: 'Top left', value: top-left }
          - { label: 'Top right', value: top-right }
          - { label: 'Bottom left', value: bottom-left }
          - { label: 'Bottom right', value: bottom-right }
        hint: 'Which part of the photo stays visible in the cropped grid thumbnail. Default is center.'
      - name: featured
        label: Feature on home page
        widget: boolean
        default: false
        hint: 'On = also appears in "Selected Frames" on the home page.'
      - name: draft
        label: Hide from site
        widget: boolean
        default: false
        hint: On = kept here but not published to the website.
      - name: publishDate
        label: Publish date (optional)
        widget: datetime
        required: false
        hint: 'Leave blank to publish now. A future date/time keeps it hidden until then — the site must rebuild for it to appear (see README on scheduled publishing).'
      - name: order
        label: Manual order
        widget: number
        value_type: int
        required: false
        hint: 'Used only when this listing''s grid is set to "manual" order. Lower numbers appear first.'
      - name: size
        label: Bento size
        widget: select
        required: false
        default: normal
        options: [normal, large, wide, tall]
        hint: 'Used only with "manual" order — spans a larger cell on desktop and collapses to normal on mobile.'
      - name: seo
        label: SEO (optional)
        widget: object
        collapsed: true
