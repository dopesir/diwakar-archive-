  eyebrow: The Eye Behind the Frame
  paragraphs:
    - >-
      Purushottam Diwakar has been a quiet witness to the Indian subcontinent
      for over 27 years. Senior Photojournalist with the India Today Group since
      1998, his work appears on the magazine’s cover and in international
      publications worldwide.
    - >-
      His work spans drought chronicles, tribal ceremonies, political upheaval,
      and the quiet dignities of daily desert life. He has photographed four
      continents and contributed over 1,300 images to Getty Images.
  signature: Witness · Humanist · Archivist
