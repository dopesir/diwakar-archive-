# Layout & alignment (Tier 3D). Every value below is the current default, so the
# site looks unchanged until you adjust something. All options are constrained
# choices — there is no raw CSS or pixel input.
layout:
  sections:
    intro: { align: left, width: normal, spacing: normal, background: none }
    featured: { align: left, width: normal, spacing: normal, background: none }
    workIntro: { align: left, width: normal, spacing: normal, background: none }
    storiesIntro: { align: left, width: normal, spacing: normal, background: none }
    thoughtsIntro: { align: left, width: normal, spacing: normal, background: none }
  grids:
    work: { columns: auto, gap: normal, aspect: landscape, imageFit: cover, sort: newest }
    stories: { columns: '1', gap: normal, sort: newest }
    thoughts: { columns: '1', gap: normal, sort: newest }
